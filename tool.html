<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>座標取得ツール</title>
    <style>
        body { font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        #canvas-container { position: relative; display: inline-block; border: 2px solid #333; cursor: crosshair; }
        img { display: block; max-width: 100%; height: auto; }
        .dot { position: absolute; width: 6px; height: 6px; background: red; border-radius: 50%; transform: translate(-50%, -50%); }
        #log { margin-top: 20px; padding: 10px; background: #eee; min-height: 50px; white-space: pre-wrap; word-break: break-all; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>

    <h2>座標取得ツール</h2>
    <p>地図をクリックして点をつなげてください。下の座標をコピーして使えます。</p>

    <div id="canvas-container">
        <img src="map.png" id="target-map">
    </div>

    <div id="log">ここに座標が表示されます</div>
    <br>
    <button onclick="clearLog()">リセット</button>

    <script>
        container.addEventListener('click', function(e) {
        const rect = container.getBoundingClientRect();
        
        // 【重要】画像の表示サイズに対して、何％の位置か計算する
        const xPercent = parseFloat(((e.clientX - rect.left) / rect.width * 100).toFixed(1));
        const yPercent = parseFloat(((e.clientY - rect.top) / rect.height * 100).toFixed(1));

        // 赤い点を表示（見た目用）
        const dot = document.createElement('div');
        dot.className = 'dot';
        dot.style.left = (e.clientX - rect.left) + 'px';
        dot.style.top = (e.clientY - rect.top) + 'px';
        container.appendChild(dot);

        // 以前の形式 [x, y] に合わせて記録
        points.push(`[${xPercent},${yPercent}]`);
        updateLog();
    });
    </script>
</body>
</html>
