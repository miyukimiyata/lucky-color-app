<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>座標取得ツール</title>
  <style>
    body { margin: 0; background: #eee; font-family: sans-serif; }
    #mapBox { position: relative; width: 100%; max-width: 800px; margin: 0 auto; background: #ccc; cursor: crosshair; }
    img { width: 100%; height: auto; display: block; pointer-events: none; }
    
    /* 座標表示用の帯（最初から表示） */
    #debug-panel {
      position: fixed; bottom: 0; left: 0; width: 100%; 
      background: rgba(0,0,0,0.9); color: #0f0; 
      padding: 15px; z-index: 10000; font-family: monospace;
      border-top: 3px solid #0f0;
    }
    #coords-val { 
      background: #222; color: #fff; padding: 10px; 
      margin: 10px 0; word-break: break-all; min-height: 40px; border: 1px solid #444;
    }
    button { padding: 10px 20px; font-weight: bold; cursor: pointer; }
  </style>
</head>
<body>

<div id="mapBox">
  <img src="map.png" id="targetImg">
</div>

<div id="debug-panel">
  <strong>【座標取得モード】地図の角をタップしてください</strong>
  <div id="coords-val">[]</div>
  <button onclick="copyCoords()">コピー</button>
  <button onclick="clearCoords()" style="margin-left:10px;">リセット</button>
  <p style="font-size:10px; color:#aaa; margin-top:5px;">※タップするたびに上の数字が増えます</p>
</div>

<script>
  var tempPoints = [];
  var mapBox = document.getElementById("mapBox");
  var output = document.getElementById("coords-val");

  // 画面のクリックイベントを直接拾う
  mapBox.addEventListener("click", function(e) {
    var rect = mapBox.getBoundingClientRect();
    
    // パーセント計算
    var x = Math.round(((e.clientX - rect.left) / rect.width) * 1000) / 10;
    var y = Math.round(((e.clientY - rect.top) / rect.height) * 1000) / 10;

    // 範囲外クリック防止
    if (x < 0 || x > 100 || y < 0 || y > 100) return;

    tempPoints.push([x, y]);
    
    // 表示更新
    output.innerText = JSON.stringify(tempPoints);
    console.log("追加:", x, y);
  });

  window.copyCoords = function() {
    var val = output.innerText;
    if (val === "[]") {
      alert("座標がありません。地図をタップしてください。");
      return;
    }
    navigator.clipboard.writeText(val).then(function() {
      alert("コピー完了！\n" + val);
    }).catch(function() {
      alert("コピー失敗。手動で選択してコピーしてください：\n" + val);
    });
  };

  window.clearCoords = function() {
    if (confirm("記録を消去しますか？")) {
      tempPoints = [];
      output.innerText = "[]";
    }
  };
</script>

</body>
</html>
