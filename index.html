<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>廃品回収 状態管理</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { margin: 0; font-family: sans-serif; background: #f0f0f0; padding-bottom: 100px; }
    .container { max-width: 800px; margin: 0 auto; padding: 10px; }
    
    h1 { text-align: center; font-size: 1.2rem; margin: 10px 0; }

    /* 地図エリア */
    .map-container {
      position: relative;
      width: 100%;
      background: #ccc;
      line-height: 0;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }

    .map-image {
      width: 100%;
      height: auto;
      display: block;
    }

    /* SVG 色塗りレイヤー */
    #map-svg {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      z-index: 10;
      pointer-events: none;
    }

    /* 文字ラベルレイヤー */
    .label-layer {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      z-index: 20;
      pointer-events: none;
    }

    .zone-label {
      position: absolute;
      transform: translate(-50%, -50%);
      text-align: center;
      pointer-events: auto;
      cursor: pointer;
    }

    .z-name, .z-status {
      display: block;
      color: #000; /* 文字は常に黒 */
      font-weight: 900;
      white-space: nowrap;
      line-height: 1.1;
      /* 強力な白縁取り */
      text-shadow: 
        1.5px 1.5px 0 #fff, -1.5px -1.5px 0 #fff, 
        1.5px -1.5px 0 #fff, 1.5px -1.5px 0 #fff,
        0 1.5px 0 #fff, 0 -1.5px 0 #fff,
        1.5px 0 0 #fff, -1.5px 0 0 #fff;
    }
    .z-name { font-size: 0.85rem; }
    .z-status { font-size: 0.65rem; }

    /* 下部リスト */
    .list-view {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 10px;
      margin-top: 20px;
    }
    .card {
      padding: 12px;
      border-radius: 8px;
      text-align: center;
      font-weight: bold;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      cursor: pointer;
      color: #000;
    }

    .btn-reset {
      display: block;
      width: 120px;
      margin: 15px auto;
      padding: 8px;
      background: #444;
      color: white;
      border: none;
      border-radius: 5px;
      font-weight: bold;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>廃品回収 状態管理</h1>
  <button class="btn-reset" onclick="resetProgress()">リセット</button>

  <div class="map-container" id="mapBox">
    <img src="map.png" class="map-image" id="baseImg">
    <svg id="map-svg" viewBox="0 0 100 100" preserveAspectRatio="none"></svg>
    <div class="label-layer" id="labelLayer"></div>
  </div>

  <div class="list-view" id="listView"></div>
</div>

<script>
  // --- 基本設定 ---
  const STATUS = [
    { label: "未着手", color: "#bdbdbd" },
    { label: "開始", color: "#81d4fa" },
    { label: "担当完了", color: "#ffd54f" },
    { label: "役員完了", color: "#66bb6a" }
  ];

  // 各地区の文字の位置 (x, y は %)
  const zones = [
    { name: "1区", x: 60, y: 55 }, { name: "1区A", x: 70, y: 45 }, { name: "1区B", x: 82, y: 42 },
    { name: "2区", x: 40, y: 60 }, { name: "3区", x: 55, y: 75 }, { name: "4区", x: 60, y: 82 },
    { name: "5区", x: 55, y: 92 }, { name: "7区", x: 42, y: 95 }, { name: "8区", x: 40, y: 83 },
    { name: "9区A", x: 18, y: 19 }, { name: "9区B", x: 18, y: 43 }, { name: "9区C", x: 40, y: 10 },
    { name: "9区D", x: 55, y: 25 }, { name: "9区E", x: 38, y: 35 }, { name: "9区F", x: 52, y: 33 }, { name: "9区G", x: 64, y: 35 }
  ];

  // エリアの色塗り用座標（ここに取得したデータを貼り付けていく）
  const polygons = {
    "1区": [[50,49],[55,49],[55,52],[59,52],[59,55],[61,54.5],[61,56],[64.8,56],[64.8,56.5],[66,56.5],[67,61],[69,61],[70,65],[71,65],[72,63],[73,64],[73,66],[74,66],[74,66.5],[72,55],[70,54.5],[61,56],[60,56],[58,56.5],[53,65],[52,64],[52,65],[51.5,65],[51.5,59],[51,59],[50.5,52]],







    "9区A": [[4.5,0.1],[23.1,0.1],[31,25.9],[31,36.9],[7.1,36.9],[4.6,0.2]],
    "9区B": [[7.5,37.1],[23.9,50.4],[16.3,50.8],[7.9,50.4],[7.5,36.8]],
    "9区C": [[23.4,0.2],[39.1,0.5],[44.5,6.7],[56.5,19],[36.4,20],[34.1,23.6],[30,22.3],[23.5,0]],
    "9区D": [[33.9,23.6],[36.3,20],[52.7,19.1],[56.5,19.1],[61.1,21.8],[66.1,24.4],[65.5,27.7],[57.8,31.5],[53,27.7],[51.9,28],[49.4,25],[41.4,28.2],[36.7,24.6],[34.2,23.7]]
  };

  let state = {};
  const KEY = "haipin_v7_final";

  // --- 進捗管理ロジック ---
  function load() {
    const s = localStorage.getItem(KEY);
    state = s ? JSON.parse(s) : {};
    zones.forEach(z => { if(state[z.name] === undefined) state[z.name] = 0; });
  }

  function toggleStatus(name) {
    state[name] = (state[name] + 1) % 4;
    localStorage.setItem(KEY, JSON.stringify(state));
    render();
  }

  function resetProgress() {
    if(confirm("すべての進捗をリセットしますか？")) {
      zones.forEach(z => state[z.name] = 0);
      localStorage.setItem(KEY, JSON.stringify(state));
      render();
    }
  }

  function render() {
    // 1. 色塗り (SVG)
    const svg = document.getElementById("map-svg");
    svg.innerHTML = "";
    Object.keys(polygons).forEach(name => {
      const p = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
      p.setAttribute("points", polygons[name].map(pt => pt.join(",")).join(" "));
      p.setAttribute("fill", STATUS[state[name]].color);
      p.setAttribute("fill-opacity", "0.6");
      p.setAttribute("stroke", "#fff");
      p.setAttribute("stroke-width", "0.2");
      p.style.pointerEvents = "auto";
      p.onclick = (e) => { e.stopPropagation(); toggleStatus(name); };
      svg.appendChild(p);
    });

    // 2. ラベル (HTML)
    const layer = document.getElementById("labelLayer");
    layer.innerHTML = "";
    zones.forEach(z => {
      const div = document.createElement("div");
      div.className = "zone-label";
      div.style.left = z.x + "%";
      div.style.top = z.y + "%";
      div.innerHTML = '<span class="z-name">' + z.name + '</span><span class="z-status">' + STATUS[state[z.name]].label + '</span>';
      div.onclick = (e) => { e.stopPropagation(); toggleStatus(z.name); };
      layer.appendChild(div);
    });

    // 3. 一覧リスト
    const lv = document.getElementById("listView");
    lv.innerHTML = "";
    zones.forEach(z => {
      const c = document.createElement("div");
      c.className = "card";
      c.style.background = STATUS[state[z.name]].color;
      c.innerHTML = z.name + '<br><small>' + STATUS[state[z.name]].label + '</small>';
      c.onclick = () => toggleStatus(z.name);
      lv.appendChild(c);
    });
  }

  // --- 起動処理 ---
  load();
  const img = document.getElementById("baseImg");
  img.onload = render;
  if (img.complete) render();
  window.onload = render;
  setTimeout(render, 500);

  </script>
</body>
</html>
