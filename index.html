<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>廃品回収 状態管理</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { margin: 0; font-family: sans-serif; background: #f0f0f0; }
    .container { max-width: 800px; margin: 0 auto; padding: 10px; }
    
    h1 { text-align: center; font-size: 1.2rem; margin: 10px 0; }

    /* 地図ベース */
    .map-container {
      position: relative;
      width: 100%;
      background: #ccc;
      line-height: 0;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }

    .map-image {
      width: 100%;
      height: auto;
      display: block;
    }

    /* SVG 色塗りレイヤー */
    #map-svg {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      z-index: 10;
      pointer-events: none;
    }

    /* 文字ラベル */
    .label-layer {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      z-index: 20;
      pointer-events: none;
    }

    .zone-label {
      position: absolute;
      transform: translate(-50%, -50%);
      text-align: center;
      pointer-events: auto; /* 文字はタップ可能 */
      cursor: pointer;
    }

    .z-name, .z-status {
      display: block;
      color: #000;
      font-weight: 900;
      white-space: nowrap;
      line-height: 1.1;
      /* 強力な白縁 */
      text-shadow: 
        1.5px 1.5px 0 #fff, -1.5px -1.5px 0 #fff, 
        1.5px -1.5px 0 #fff, 1.5px -1.5px 0 #fff,
        0 1.5px 0 #fff, 0 -1.5px 0 #fff,
        1.5px 0 0 #fff, -1.5px 0 0 #fff;
    }
    .z-name { font-size: 0.85rem; }
    .z-status { font-size: 0.65rem; }

    /* 下部リスト */
    .list-view {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 10px;
      margin-top: 20px;
    }
    .card {
      padding: 12px;
      border-radius: 8px;
      text-align: center;
      font-weight: bold;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      cursor: pointer;
      color: #000;
    }

    .btn-reset {
      display: block;
      width: 120px;
      margin: 15px auto;
      padding: 8px;
      background: #444;
      color: white;
      border: none;
      border-radius: 5px;
      font-weight: bold;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>廃品回収 状態管理</h1>
  <button class="btn-reset" onclick="resetAll()">リセット</button>

  <div class="map-container" id="mapBox">
    <img src="map.png" class="map-image" id="baseImg">
    <svg id="map-svg" viewBox="0 0 100 100" preserveAspectRatio="none"></svg>
    <div class="label-layer" id="labelLayer"></div>
  </div>

  <div class="list-view" id="listView"></div>
</div>

<script>
  const STATUS = [
    { label: "未着手", color: "#bdbdbd" },
    { label: "開始", color: "#81d4fa" },
    { label: "担当完了", color: "#ffd54f" },
    { label: "役員完了", color: "#66bb6a" }
  ];

  const zones = [
    { name: "1区", x: 60, y: 55 }, { name: "1区A", x: 70, y: 45 }, { name: "1区B", x: 82, y: 42 },
    { name: "2区", x: 40, y: 60 }, { name: "3区", x: 55, y: 75 }, { name: "4区", x: 60, y: 82 },
    { name: "5区", x: 55, y: 92 }, { name: "7区", x: 42, y: 95 }, { name: "8区", x: 40, y: 83 },
    { name: "9区A", x: 18, y: 19 }, { name: "9区B", x: 18, y: 43 }, { name: "9区C", x: 40, y: 10 },
    { name: "9区D", x: 55, y: 25 }, { name: "9区E", x: 38, y: 35 }, { name: "9区F", x: 52, y: 33 }, { name: "9区G", x: 64, y: 35 }
  ];

  const polygons = {
    "1区": [[50,49],[55,49],[55,52],[59,52],[59,55],[61,54.5],[61,56],[64.8,56],[64.8,56.5],[66,56.5],[67,61],[69,61],[70,65],[71,65],[72,63],[73,64],[73,66],[74,66],[74,66.5],[72,55],[70,54.5],[61,56],[60,56],[58,56.5],[53,65],[52,64],[52,65],[51.5,65],[51.5,59],[51,59],[50.5,52]],
    "9区A": [[6,1],[25,1],[31,28],[30,36],[8.5,37]],
    "9区B": [[8.5,37],[30,36],[30,50],[8.5,50]]
  };

  let state = {};
  const KEY = "haipin_v6";

  function load() {
    const s = localStorage.getItem(KEY);
    state = s ? JSON.parse(s) : {};
    zones.forEach(z => { if(state[z.name] === undefined) state[z.name] = 0; });
  }

  function update(name) {
    state[name] = (state[name] + 1) % 4;
    localStorage.setItem(KEY, JSON.stringify(state));
    render();
  }

  function resetAll() {
    if(confirm("リセットしますか？")) {
      zones.forEach(z => state[z.name] = 0);
      localStorage.setItem(KEY, JSON.stringify(state));
      render();
    }
  }

  function render() {
    // 1. 色塗り (SVG)
    const svg = document.getElementById("map-svg");
    svg.innerHTML = "";
    Object.keys(polygons).forEach(name => {
      const p = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
      p.setAttribute("points", polygons[name].map(pt => pt.join(",")).join(" "));
      p.setAttribute("fill", STATUS[state[name]].color);
      p.setAttribute("fill-opacity", "0.6");
      p.setAttribute("stroke", "#fff");
      p.setAttribute("stroke-width", "0.2");
      p.style.pointerEvents = "auto";
      p.onclick = () => update(name);
      svg.appendChild(p);
    });

    // 2. ラベル (HTML)
    const layer = document.getElementById("labelLayer");
    layer.innerHTML = "";
    zones.forEach(z => {
      const div = document.createElement("div");
      div.className = "zone-label";
      div.style.left = z.x + "%";
      div.style.top = z.y + "%";
      div.innerHTML = `<span class="z-name">${z.name}</span><span class="z-status">${STATUS[state[z.name]].label}</span>`;
      div.onclick = () => update(z.name);
      layer.appendChild(div);
    });

    // 3. リスト
    const lv = document.getElementById("listView");
    lv.innerHTML = "";
    zones.forEach(z => {
      const c = document.createElement("div");
      c.className = "card";
      c.style.background = STATUS[state[z.name]].color;
      c.innerHTML = `${z.name}<br><small>${STATUS[state[z.name]].label}</small>`;
      c.onclick = () => update(z.name);
      lv.appendChild(c);
    });
  }

  // 起動
  load();
  render();

  // スマホ対策：読み込み完了時に再描画
  window.onload = render;
  setTimeout(render, 500);


// --- 既存の script タグの中、render関数の下などに追加してください ---

// 1. クリックした場所の座標を記録する一時配列
let tempPoints = [];

// 2. 地図エリアにクリックイベントを追加
const mapArea = document.getElementById("mapArea");

mapArea.addEventListener("click", function(e) {
  // 地図の左上からのクリック位置を計算
  const rect = mapArea.getBoundingClientRect();
  const x = Math.round(((e.clientX - rect.left) / rect.width) * 1000) / 10;
  const y = Math.round(((e.clientY - rect.top) / rect.height) * 1000) / 10;

  // 配列に追加 [x, y]
  tempPoints.push([x, y]);

  // コンソールと画面に見やすく表示
  console.log(`現在のポリゴンデータ: [${tempPoints.map(p => `[${p[0]},${p[1]}]`).join(",")}]`);
  
  // 画面上にリアルタイムで座標リストを表示（確認用）
  updateCoordDisplay();
});

// 座標表示用のエリアを画面の一番下に追加する関数
function updateCoordDisplay() {
  let display = document.getElementById("coord-debug");
  if (!display) {
    display = document.createElement("div");
    display.id = "coord-debug";
    display.style = "position:fixed; bottom:0; left:0; width:100%; background:rgba(0,0,0,0.8); color:#0f0; padding:10px; font-family:monospace; z-index:9999; font-size:12px; max-height:150px; overflow-y:auto;";
    document.body.appendChild(display);
  }
  
  display.innerHTML = `
    <div><strong>クリックした座標（これをコピーして polygons に貼り付け）:</strong></div>
    <div style="word-break:break-all;">[${tempPoints.map(p => `[${p[0]},${p[1]}]`).join(",")}]</div>
    <button onclick="tempPoints=[]; updateCoordDisplay();" style="margin-top:5px;">リセット</button>
    <button onclick="navigator.clipboard.writeText(document.getElementById('coord-debug').children[1].innerText); alert('コピーしました！')" style="margin-top:5px;">コピーする</button>
  `;
}
</script>
</body>
</html>
