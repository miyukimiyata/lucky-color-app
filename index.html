<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <title>廃品回収 共有管理</title>
  <style>
    /* CSSはそのまま維持 */
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; font-family: sans-serif; background: #f0f0f0; overflow-x: hidden; }
    body { padding-bottom: 120px; }
    .container { max-width: 100%; margin: 0 auto; padding: 10px; }
    h1 { text-align: center; font-size: 1.1rem; margin: 5px 0; }
    .loading-notice { text-align: center; font-size: 0.8rem; color: #666; margin-bottom: 8px; min-height: 1.2em; }
    .controls { text-align: center; margin: 10px 0 12px; }
    .btn-refresh { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 20px; font-weight: bold; font-size: 0.95rem; cursor: pointer; }
    .map-container { width: 100%; background: #ccc; border-radius: 14px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
    .map-stage { position: relative; width: 100%; aspect-ratio: 750 / 1334; min-height: 340px; line-height: 0; overflow: hidden; touch-action: manipulation; }
    .map-image { position: absolute; inset: 0; width: 100%; height: 100%; display: block; user-select: none; -webkit-user-drag: none; pointer-events: none; }
    #map-svg { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 10; }
    .label-layer { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 20; pointer-events: none; }
    .zone-label { position: absolute; transform: translate(-50%, -50%); text-align: center; pointer-events: auto; cursor: pointer; }
    .z-name, .z-status { display: block; color: #000; font-weight: bold; white-space: nowrap; line-height: 1.08; text-shadow: 1px 1px 0 #fff, -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff; }
    .z-name { font-size: 0.95rem; }
    .z-status { font-size: 0.72rem; }
    .list-view { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; margin-top: 16px; }
    .card { padding: 12px; border-radius: 12px; text-align: left; box-shadow: 0 2px 5px rgba(0,0,0,0.1); cursor: pointer; color: #000; min-height: 112px; }
    .card-title { font-weight: bold; font-size: 0.95rem; border-bottom: 1px solid rgba(0,0,0,0.08); margin-bottom: 6px; padding-bottom: 4px; }
    .card-time { font-size: 0.8rem; line-height: 1.55; opacity: 0.9; }
  </style>
</head>
<body>

<div class="container">
  <h1>廃品回収 共有管理</h1>
  <div class="loading-notice" id="msg">読み込み中...</div>

  <div class="controls">
    <button class="btn-refresh" onclick="manualRefresh()">最新に更新</button>
  </div>

  <div class="map-container">
    <div class="map-stage">
      <img src="map.png" class="map-image" alt="地図">
      <svg id="map-svg" viewBox="0 0 100 100" preserveAspectRatio="none"></svg>
      <div class="label-layer" id="labelLayer"></div>
    </div>
  </div>

  <div class="list-view" id="listView"></div>
</div>

<script>
  const APP_URL = "https://script.google.com/macros/s/AKfycbw8aUmcrFcMffyCcvP7qyGSUyT_9eTia9snd1F--LDeE7WgatvTbmEjwLJZeQ4Ah3qI/exec";

  const STATUS = [
    { label: "未着手", color: "#bdbdbd" },
    { label: "開始", color: "#81d4fa" },
    { label: "担当完了", color: "#ffd54f" },
    { label: "役員完了", color: "#66bb6a" }
  ];

  // 各区画の座標データ（省略せずそのままお使いください）
  const zones = [{ name: "1区", x: 60, y: 58 }, { name: "1区A", x: 60, y: 45 }, { name: "1区B", x: 82, y: 45 },{ name: "2区", x: 35, y: 58 }, { name: "3区", x: 55, y: 75 }, { name: "4区", x: 60, y: 82 },{ name: "5区", x: 55, y: 92 }, { name: "7区", x: 42, y: 95 }, { name: "8区", x: 40, y: 83 },{ name: "9区A", x: 18, y: 19 }, { name: "9区B", x: 18, y: 43 }, { name: "9区C", x: 40, y: 10 },{ name: "9区D", x: 50, y: 22 }, { name: "9区E", x: 38, y: 35 }, { name: "9区F", x: 52, y: 33 }, { name: "9区G", x: 67, y: 34 }];
  const polygons = { /* ...以前のコードと同じポリゴンデータが入る... */ };

  let state = {};
  let pendingChanges = {}; // 自分が今操作した内容を一時保存する場所

  function safeZone(raw) {
    const n = Number(raw && raw.status);
    return {
      status: [0,1,2,3].includes(n) ? n : 0,
      start: raw && raw.start ? String(raw.start) : "",
      end: raw && raw.end ? String(raw.end) : ""
    };
  }

  function blankState() {
    const obj = {};
    zones.forEach(z => { obj[z.name] = { status: 0, start: "", end: "" }; });
    return obj;
  }

  function getCurrentTime() {
    const now = new Date();
    return String(now.getHours()).padStart(2, "0") + ":" + String(now.getMinutes()).padStart(2, "0");
  }

  async function loadFromSheet() {
    try {
      const url = `${APP_URL}?t=${Date.now()}`;
      const res = await fetch(url, { cache: "no-store" });
      if (!res.ok) return;

      const data = await res.json();
      const now = Date.now();

      zones.forEach(z => {
        // 自分が操作してから60秒以内の区画は、スプレッドシートのデータ（古い可能性がある）を無視する
        if (pendingChanges[z.name] && (now - pendingChanges[z.name].time < 60000)) {
          state[z.name] = pendingChanges[z.name].data;
        } else {
          state[z.name] = safeZone(data[z.name]);
          if (pendingChanges[z.name]) delete pendingChanges[z.name]; // 60秒過ぎたら解除
        }
      });

      render();
      document.getElementById("msg").innerText = "自動更新中: " + new Date().toLocaleTimeString("ja-JP");
    } catch (e) {
      console.log("Sync delay...");
    }
  }

  async function toggleStatus(name) {
    let z = safeZone(state[name]);
    z.status = (z.status + 1) % 4;

    if (z.status === 0) { z.start = ""; z.end = ""; }
    else if (z.status === 1) { z.start = getCurrentTime(); z.end = ""; }
    else { if (!z.start) z.start = getCurrentTime(); z.end = getCurrentTime(); }

    // 1. 自分の「今やった操作」を記録（これが最優先される）
    pendingChanges[name] = { data: { ...z }, time: Date.now() };
    state[name] = z; 
    
    render(); // 即座に画面を変える

    document.getElementById("msg").innerText = "保存中...";
    try {
      await fetch(APP_URL, {
        method: "POST",
        mode: "no-cors", // 高速化のためレスポンスを待たない設定
        body: JSON.stringify({ name, ...z })
      });
      document.getElementById("msg").innerText = "保存指示OK";
    } catch (e) {
      document.getElementById("msg").innerText = "通信不安定";
    }
  }

  // --- render 関数の中身は以前と同じ ---
  function render() {
    const svg = document.getElementById("map-svg");
    const layer = document.getElementById("labelLayer");
    const lv = document.getElementById("listView");
    if(!svg || !layer || !lv) return;

    svg.innerHTML = ""; layer.innerHTML = ""; lv.innerHTML = "";

    // ポリゴン描画
    Object.keys(polygons).forEach(name => {
      const z = safeZone(state[name]);
      const islandList = Array.isArray(polygons[name][0][0]) ? polygons[name] : [polygons[name]];
      islandList.forEach(points => {
        const p = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
        p.setAttribute("points", points.map(pt => pt.join(",")).join(" "));
        p.setAttribute("fill", STATUS[z.status].color);
        p.setAttribute("fill-opacity", z.status === 0 ? "0.2" : "0.8");
        p.setAttribute("stroke", "#fff");
        p.setAttribute("stroke-width", "0.4");
        p.onclick = (e) => { e.stopPropagation(); toggleStatus(name); };
        svg.appendChild(p);
      });
    });

    // ラベルとカード
    zones.forEach(z => {
      const s = safeZone(state[z.name]);
      const div = document.createElement("div");
      div.className = "zone-label";
      div.style.left = z.x + "%"; div.style.top = z.y + "%";
      div.innerHTML = `<span class="z-name">${z.name}</span><span class="z-status">${STATUS[s.status].label}</span>`;
      div.onclick = (e) => { e.stopPropagation(); toggleStatus(z.name); };
      layer.appendChild(div);

      const c = document.createElement("div");
      c.className = "card";
      c.style.background = STATUS[s.status].color;
      c.innerHTML = `<div class="card-title">${z.name}</div><div class="card-time">開始 ${s.start || "--:--"}<br>完了 ${s.end || "--:--"}</div>`;
      c.onclick = () => toggleStatus(z.name);
      lv.appendChild(c);
    });
  }

  window.onload = () => {
    state = blankState();
    render();
    loadFromSheet();
    setInterval(loadFromSheet, 5000); // 更新間隔を5秒に短縮
  };
</script>
</body>
</html>
