<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>廃品回収 状態管理</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: sans-serif; background: #f5f5f5; }
    .wrap { max-width: 900px; margin: 0 auto; padding: 10px; }

    /* 地図エリア：ここが全ての基準 */
    .map-area {
      position: relative;
      width: 100%;
      background: #eee;
      line-height: 0;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      touch-action: manipulation;
    }

    .map-image {
      width: 100%;
      height: auto;
      display: block;
    }

    /* SVG（色塗り）：画像の上にピッタリ重ねる */
    #zoneSvg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 5;
      pointer-events: none; /* 下のボタンを触れるようにする */
    }

    #zoneSvg polygon {
      pointer-events: auto; /* ポリゴン自体はタップ可能にする */
      cursor: pointer;
      stroke: #fff;
      stroke-width: 0.2;
    }

    /* ボタン（文字）：一番上に配置 */
    .zone-btn {
      position: absolute;
      transform: translate(-50%, -50%);
      background: transparent;
      border: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 10;
      padding: 5px;
      cursor: pointer;
    }

    /* 文字は常に黒、白い縁取り */
    .zone-name, .zone-status {
      color: #000;
      font-weight: 900;
      white-space: nowrap;
      line-height: 1.1;
      text-shadow: 
        1.5px 1.5px 0 #fff, -1.5px -1.5px 0 #fff, 
        1.5px -1.5px 0 #fff, 1.5px -1.5px 0 #fff,
        0 1.5px 0 #fff, 0 -1.5px 0 #fff,
        1.5px 0 0 #fff, -1.5px 0 0 #fff;
    }
    .zone-name { font-size: 0.85rem; }
    .zone-status { font-size: 0.65rem; margin-top: 1px; }

    /* 下部リスト */
    .zone-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 10px;
      margin-top: 20px;
    }
    .zone-card {
      padding: 12px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      font-weight: bold;
      cursor: pointer;
    }
    .reset-btn {
      display: block;
      width: 150px;
      margin: 10px auto;
      padding: 8px;
      background: #333;
      color: white;
      border: none;
      border-radius: 5px;
    }
  </style>
</head>
<body>

<div class="wrap">
  <h1 style="text-align:center; font-size:1.4rem;">廃品回収 状態管理</h1>
  <button class="reset-btn" id="resetBtn">リセット</button>

  <div class="map-area" id="mapArea">
    <img src="map.png" class="map-image" id="mapImg">
    </div>

  <div class="zone-list" id="zoneList"></div>
</div>

<script>
  const STATUS = [
    { label: "未着手", color: "#bdbdbd" },
    { label: "開始", color: "#81d4fa" },
    { label: "担当完了", color: "#ffd54f" },
    { label: "役員完了", color: "#66bb6a" }
  ];

  const zones = [
    { name: "1区", x: 60, y: 55 }, { name: "1区A", x: 70, y: 45 }, { name: "1区B", x: 82, y: 42 },
    { name: "2区", x: 40, y: 60 }, { name: "3区", x: 55, y: 75 }, { name: "4区", x: 60, y: 82 },
    { name: "5区", x: 55, y: 92 }, { name: "7区", x: 42, y: 95 }, { name: "8区", x: 40, y: 83 },
    { name: "9区A", x: 18, y: 19 }, { name: "9区B", x: 18, y: 43 }, { name: "9区C", x: 40, y: 10 },
    { name: "9区D", x: 55, y: 25 }, { name: "9区E", x: 38, y: 35 }, { name: "9区F", x: 52, y: 33 }, { name: "9区G", x: 64, y: 35 }
  ];

  const zonePolygons = {
    "1区": [[50,49],[55,49],[55,52],[59,52],[59,55],[61,54.5],[61,56],[64.8,56],[64.8,56.5],[66,56.5],[67,61],[69,61],[70,65],[71,65],[72,63],[73,64],[73,66],[74,66],[74,66.5],[72,55],[70,54.5],[61,56],[60,56],[58,56.5],[53,65],[52,64],[52,65],[51.5,65],[51.5,59],[51,59],[50.5,52]],
    "9区A": [[6,1],[25,1],[31,28],[30,36],[8.5,37]],
    "9区B": [[8.5,37],[30,36],[30,50],[8.5,50]]
  };

  let state = {};
  const STORAGE_KEY = "haipin_final";

  function init() {
    const saved = localStorage.getItem(STORAGE_KEY);
    state = saved ? JSON.parse(saved) : {};
    zones.forEach(z => { if (state[z.name] === undefined) state[z.name] = 0; });
  }

  function toggle(name) {
    state[name] = (state[name] + 1) % 4;
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    render();
  }

  function render() {
    const mapArea = document.getElementById("mapArea");
    const list = document.getElementById("zoneList");

    // SVGの作成または取得
    let svg = document.getElementById("zoneSvg");
    if (!svg) {
      svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
      svg.id = "zoneSvg";
      svg.setAttribute("viewBox", "0 0 100 100");
      svg.setAttribute("preserveAspectRatio", "none");
      mapArea.appendChild(svg);
    }
    svg.innerHTML = "";

    // 色塗りの描画
    Object.keys(zonePolygons).forEach(name => {
      const poly = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
      poly.setAttribute("points", zonePolygons[name].map(p => p.join(",")).join(" "));
      poly.setAttribute("fill", STATUS[state[name]].color);
      poly.setAttribute("fill-opacity", "0.5");
      poly.onclick = (e) => { e.stopPropagation(); toggle(name); };
      svg.appendChild(poly);
    });

    // ボタン（文字）の描画
    mapArea.querySelectorAll(".zone-btn").forEach(b => b.remove());
    zones.forEach(z => {
      const btn = document.createElement("div");
      btn.className = "zone-btn";
      btn.style.left = z.x + "%";
      btn.style.top = z.y + "%";
      btn.innerHTML = `<div class="zone-name">${z.name}</div><div class="zone-status">${STATUS[state[z.name]].label}</div>`;
      btn.onclick = (e) => { e.stopPropagation(); toggle(z.name); };
      mapArea.appendChild(btn);
    });

    // リストの描画
    list.innerHTML = "";
    zones.forEach(z => {
      const card = document.createElement("div");
      card.className = "zone-card";
      card.style.background = STATUS[state[z.name]].color;
      card.innerHTML = `${z.name}<br><small>${STATUS[state[z.name]].label}</small>`;
      card.onclick = () => toggle(z.name);
      list.appendChild(card);
    });
  }

  init();
  // 画像読み込み完了後に実行
  const img = document.getElementById("mapImg");
  img.onload = render;
  if (img.complete) render();
  
  // スマホの再描画対策
  window.addEventListener('load', render);
  setTimeout(render, 500);

  document.getElementById("resetBtn").onclick = () => {
    if(confirm("リセット？")) {
      zones.forEach(z => state[z.name] = 0);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      render();
    }
  };
</script>
</body>
</html>
