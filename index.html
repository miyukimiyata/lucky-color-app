<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>廃品回収 状態管理</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: sans-serif; background: #f5f5f5; }
    .wrap { max-width: 900px; margin: 0 auto; padding: 16px; }

    /* 地図エリア（ここが肝心） */
    .map-area {
      position: relative;
      width: 100%;
      line-height: 0;
      background: #ccc;
      border-radius: 12px;
      overflow: hidden;
    }
    .map-image {
      width: 100%;
      height: auto;
      display: block;
    }

    /* ボタンのデザイン：背景なし、文字は黒、強力な白縁 */
    .zone-btn {
      position: absolute;
      transform: translate(-50%, -50%);
      background: transparent;
      border: none;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 999; /* 最前面に強制 */
      padding: 10px; /* タップしやすく */
    }

    .zone-name, .zone-status {
      color: #000;
      font-weight: 900;
      white-space: nowrap;
      line-height: 1.2;
      /* 白い縁取り（これがあれば背景が何色でも読めます） */
      text-shadow: 
        2px 2px 0 #fff, -2px -2px 0 #fff, 
        2px -2px 0 #fff, -2px 2px 0 #fff,
        0 2px 0 #fff, 0 -2px 0 #fff,
        2px 0 0 #fff, -2px 0 0 #fff;
    }
    .zone-name { font-size: 1rem; }
    .zone-status { font-size: 0.8rem; }

    /* 下部リスト */
    .zone-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 10px;
      margin-top: 20px;
    }
    .zone-card {
      padding: 15px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      cursor: pointer;
    }
    .reset-btn {
      display: block;
      width: 200px;
      margin: 10px auto;
      padding: 10px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="wrap">
    <h1 style="text-align:center;">廃品回収 状態管理</h1>
    
    <button class="reset-btn" id="resetBtn">リセット</button>

    <div class="map-area" id="mapArea">
      <img src="map.png" class="map-image">
      </div>

    <div class="zone-list" id="zoneList"></div>
  </div>

  <script>
    const STATUS = [
      { label: "未着手", color: "#bdbdbd" },
      { label: "開始", color: "#81d4fa" },
      { label: "担当完了", color: "#ffd54f" },
      { label: "役員完了", color: "#66bb6a" }
    ];

    const zones = [
      { name: "1区", x: 60, y: 55 }, { name: "1区A", x: 70, y: 45 }, { name: "1区B", x: 82, y: 42 },
      { name: "2区", x: 40, y: 60 }, { name: "3区", x: 55, y: 75 }, { name: "4区", x: 60, y: 82 },
      { name: "5区", x: 55, y: 92 }, { name: "7区", x: 42, y: 95 }, { name: "8区", x: 40, y: 83 },
      { name: "9区A", x: 18, y: 19 }, { name: "9区B", x: 18, y: 43 }, { name: "9区C", x: 40, y: 10 },
      { name: "9区D", x: 55, y: 25 }, { name: "9区E", x: 38, y: 35 }, { name: "9区F", x: 52, y: 33 }, { name: "9区G", x: 64, y: 35 }
    ];

    let state = {};

    // データの読み込み
    function init() {
      const saved = localStorage.getItem("haipin_simple");
      if (saved) {
        state = JSON.parse(saved);
      } else {
        zones.forEach(z => state[z.name] = 0);
      }
    }

    function toggle(name) {
      state[name] = (state[name] + 1) % 4;
      localStorage.setItem("haipin_simple", JSON.stringify(state));
      render();
    }

    function render() {
      const mapArea = document.getElementById("mapArea");
      const list = document.getElementById("zoneList");

      // 既存のボタンを削除（imgタグ以外を消す）
      const oldBtns = mapArea.querySelectorAll(".zone-btn");
      oldBtns.forEach(b => b.remove());

      // リストをクリア
      list.innerHTML = "";

      zones.forEach(z => {
        const currentStatus = STATUS[state[z.name]];

        // 地図上のボタン作成
        const btn = document.createElement("div");
        btn.className = "zone-btn";
        btn.style.left = z.x + "%";
        btn.style.top = z.y + "%";
        btn.innerHTML = `
          <div class="zone-name">${z.name}</div>
          <div class="zone-status">${currentStatus.label}</div>
        `;
        btn.onclick = () => toggle(z.name);
        mapArea.appendChild(btn);

        // 下部リストのカード作成
        const card = document.createElement("div");
        card.className = "zone-card";
        card.style.background = currentStatus.color;
        card.innerHTML = `<strong>${z.name}</strong><br>${currentStatus.label}`;
        card.onclick = () => toggle(z.name);
        list.appendChild(card);
      });
    }

    document.getElementById("resetBtn").onclick = () => {
      if(confirm("リセット？")) {
        zones.forEach(z => state[z.name] = 0);
        render();
      }
    };

    // 実行
    init();
    render();
  </script>
</body>
</html>
