<div class="map-outer">
  <div class="map-content">
    <img src="ここに地図のURL" class="map-image" id="baseImg" onload="render()">
    <svg id="map-svg" viewBox="0 0 100 100" preserveAspectRatio="none"></svg>
    <div class="label-layer" id="labelLayer"></div>
  </div>
</div>

<style>
  /* 以前のシンプルなスタイル */
  .map-outer {
    position: relative;
    width: 100%;
    background: #eee;
    overflow: hidden; /* ズームがないので固定 */
  }
  .map-image {
    width: 100%;
    display: block;
  }
</style>
